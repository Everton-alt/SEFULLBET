<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | SeFull Bet</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0e14; --card: #161b22; --border: #30363d; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .register-card { background: var(--card); padding: 35px; border-radius: 15px; border: 1px solid var(--border); width: 100%; max-width: 450px; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.75rem; color: #8b949e; margin-bottom: 6px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: #fff; outline: none; }
        .btn-register { width: 100%; padding: 14px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .termo-wrapper { margin: 20px 0; display: flex; gap: 10px; align-items: center; font-size: 0.85rem; color: var(--primary); }
    </style>
</head>
<body>

<div class="register-card">
    <div class="logo">SEFULL<span>BET</span></div>
    <form id="form-cadastro">
        <div class="input-group">
            <label>Nome Completo</label>
            <input type="text" id="nome" required>
        </div>
        <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="email" required>
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="senha" required>
        </div>
        <div class="input-group">
            <label>Plano</label>
            <select id="perfil">
                <option value="gratis">Grátis</option>
                <option value="vip">VIP</option>
                <option value="premium">Premium</option>
            </select>
        </div>
        <div class="termo-wrapper">
            <input type="checkbox" id="checkTermo" required>
            <label for="checkTermo">Aceito os termos SeFullBet</label>
        </div>
        <button type="submit" class="btn-register" id="btnSubmit">CRIAR MINHA CONTA</button>
    </form>
</div>

<script>
    const API_URL = "https://sefullbet.onrender.com";
    const btnSubmit = document.getElementById('btnSubmit');

    document.getElementById('form-cadastro').onsubmit = async function(e) {
        e.preventDefault();
        btnSubmit.disabled = true;
        btnSubmit.innerText = "CRIANDO...";

        const novoUsuario = {
            nome: document.getElementById('nome').value.trim(),
            email: document.getElementById('email').value.toLowerCase().trim(),
            senha: document.getElementById('senha').value,
            perfil: document.getElementById('perfil').value,
            status: "pendente",
            expiracao: null
        };

        try {
            const response = await fetch(`${API_URL}/api/usuarios`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novoUsuario)
            });

            const data = await response.json();
            if (response.ok) {
                alert("Cadastro realizado! O administrador ativará seu acesso em breve.");
                window.location.href = 'login.html';
            } else {
                alert("Erro: " + (data.erro || "Verifique os dados."));
            }
        } catch (error) {
            alert("Erro ao conectar com o servidor.");
        } finally {
            btnSubmit.disabled = false;
            btnSubmit.innerText = "CRIAR MINHA CONTA";
        }
    };
</script>
</body>
</html>
