<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha | SeFull Bet</title>
  <style>
    :root { --primary: #00ff88; --bg: #0b0e14; --card: #161b22; --border: #30363d; --text: #ffffff; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; background-image: radial-gradient(circle at 50% 0%, #1c2128 0%, #0b0e14 100%); }
    .reset-card { background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid var(--border); width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
    .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 30px; }
    .logo span { color: #fff; }
    .input-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 8px; font-weight: bold; }
    input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: #fff; outline: none; transition: 0.3s; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(0, 255, 136, 0.2); }
    .btn-reset { width: 100%; padding: 14px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 1rem; margin-top: 10px; }
    .btn-reset:disabled { opacity: 0.5; cursor: not-allowed; }
    .footer-links { margin-top: 25px; font-size: 0.85rem; color: #8b949e; }
    .footer-links a { color: var(--primary); text-decoration: none; font-weight: bold; }
    .msg { font-size: 0.85rem; margin-top: 10px; display: none; }
    .erro { color: #ff4d4d; }
    .sucesso { color: var(--primary); }
  </style>
</head>
<body>

<div class="reset-card">
  <div class="logo">SEFULL<span>BET</span></div>
  <form id="form-reset">
    <div class="input-group">
      <label for="email">Digite seu e-mail cadastrado</label>
      <input type="email" id="email" placeholder="seu@email.com" required>
    </div>
    <p class="msg erro" id="msg-erro"></p>
    <p class="msg sucesso" id="msg-sucesso"></p>
    <button type="submit" class="btn-reset" id="btn-reset">RECUPERAR SENHA</button>
  </form>
  <div class="footer-links">
    Lembrou sua senha? <a href="/login.html">Entrar</a>
  </div>
</div>

<script>
document.getElementById('form-reset').onsubmit = async function(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-reset');
  const erro = document.getElementById('msg-erro');
  const sucesso = document.getElementById('msg-sucesso');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  erro.style.display = 'none';
  sucesso.style.display = 'none';

  try {
    const email = document.getElementById('email').value;
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      erro.textContent = 'Digite um e-mail válido.';
      erro.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'RECUPERAR SENHA';
      return;
    }

    const res = await fetch('/api/auth/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    if (!res.ok) {
      erro.textContent = data.erro || 'Erro ao solicitar recuperação';
      erro.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'RECUPERAR SENHA';
      return;
    }

    sucesso.textContent = 'Instruções enviadas para seu e-mail!';
    sucesso.style.display = 'block';
    btn.textContent = 'Enviado';
  } catch (err) {
    erro.textContent = 'Erro de conexão. Tente novamente.';
    erro.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'RECUPERAR SENHA';
  }
};
</script>
</body>
</html>
