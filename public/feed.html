<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeFull Bet | Sinais de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --danger: #ff4d4d; --bg: #0b0e14; --card-bg: #161b22; --card-highlight: #1c2128; --text: #ffffff; --accent: #6e40ff; --vip: #ffd700; --border: #30363d; --shadow: 0 10px 30px rgba(0,0,0,0.5); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 110px; min-height: 100vh; background-image: radial-gradient(circle at 50% -20%, #1c2128 0%, #0b0e14 100%); line-height: 1.5; }
        header { background: rgba(22,27,34,0.85); backdrop-filter: blur(15px); padding: 18px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 400; font-size: 2.5rem; color: var(--primary); letter-spacing: -2px; }
        .logo span { color: var(--text); }
        #auth-box { display: flex; align-items: center; gap: 18px; }
        .btn-auth { border: 1px solid var(--border); color: #fff; padding: 10px 20px; border-radius: 12px; text-decoration: none; font-size: 0.85rem; font-weight: 700; background: rgba(255,255,255,0.03); transition: 0.3s; cursor: pointer; }
        .date-navigator { padding: 15px 5% 10px; max-width: 650px; margin: 0 auto; }
        .date-input-wrapper { background: var(--card-bg); padding: 14px 18px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        input[type="date"] { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 1rem; cursor: pointer; }
        .stat-bar { display: flex; gap: 12px; padding: 15px 5%; overflow-x: auto; justify-content: center; }
        .stat-item { background: var(--card-highlight); padding: 12px 24px; border-radius: 50px; border: 1px solid var(--border); font-size: 0.75rem; font-weight: 800; color: #8b949e; }
        .section-header { padding: 35px 5% 20px; max-width: 650px; margin: 0 auto; display: flex; align-items: center; gap: 15px; }
        .section-header h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: #8b949e; font-weight: 800; }
        .section-header .line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
        main { padding: 0 5%; max-width: 650px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 22px; margin-bottom: 20px; border: 1px solid var(--border); position: relative; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); cursor: pointer; }
        .card-vip { border-color: rgba(255,215,0,0.3); }
        .vip-tag { position: absolute; top: -12px; left: 20px; background: linear-gradient(90deg, #ffd700, #ffaa00); color: #000; font-size: 0.65rem; font-weight: 900; padding: 4px 12px; border-radius: 6px; }
        .odd-box { background: var(--bg); padding: 12px; border-radius: 12px; text-align: center; min-width: 80px; border: 1px solid var(--border); }
        .status { font-size: 0.7rem; font-weight: 800; padding: 5px 12px; border-radius: 8px; text-transform: uppercase; margin-top: 12px; display: inline-block; }
        .status-green { color: var(--primary); border: 1px solid var(--primary); background: rgba(0,255,136,0.08); }
        .status-red { color: var(--danger); border: 1px solid var(--danger); background: rgba(255,77,77,0.08); }
        .status-live { color: #fff; border: 1px solid var(--border); background: rgba(255,255,255,0.05); }
        .vitorias-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .vitoria-card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform 0.2s; box-shadow: var(--shadow); }
        .vitoria-card:active { transform: scale(0.95); }
        .vitoria-img-capa { width: 100%; height: 110px; object-fit: cover; border-bottom: 1px solid var(--border); }
        .vitoria-content { padding: 12px; }
        .vitoria-titulo { color: var(--vip); font-weight: 800; font-size: 0.75rem; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .vitoria-assunto-parcial { font-size: 0.65rem; color: #8b949e; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        .pagination-container { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; gap: 10px; }
        .btn-page { flex: 1; padding: 12px; background: var(--card-highlight); border: 1px solid var(--border); color: white; border-radius: 12px; cursor: pointer; font-size: 0.75rem; font-weight: 800; }
        .page-info { font-size: 0.75rem; color: #8b949e; min-width: 60px; text-align: center; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; overflow-y:auto; padding:10px; }
        .modal-content { max-width:550px; margin:40px auto; background:var(--card-bg); border-radius:28px; padding:25px; border:1px solid var(--border); }
        .modal-gallery { display:flex; flex-direction:column; gap:12px; margin:15px 0; }
        .modal-gallery img { width:100%; border-radius:12px; border:1px solid var(--border); }
        .close-btn { background:var(--danger); border:none; color:white; padding:12px; border-radius:12px; width:100%; cursor:pointer; margin-top:15px; font-weight:800; }
        .news-img-feed { width:100%; height:160px; object-fit:cover; border-radius:12px; margin-top:10px; border:1px solid var(--border); background:#000; }
        .tab-bar { position:fixed; bottom:0; left:0; width:100%; background:rgba(13,17,23,0.95); backdrop-filter:blur(20px); display:flex; justify-content:space-around; padding:12px 0 25px; border-top:1px solid var(--border); z-index:1000; }
        .tab-item { display:flex; flex-direction:column; align-items:center; color:#8b949e; text-decoration:none; font-size:0.7rem; font-weight:700; gap:5px; cursor:pointer; }
        .tab-vip-btn { background:linear-gradient(135deg,#ffd700,#ffaa00); color:#000 !important; padding:8px 20px; border-radius:14px; transform:translateY(-10px); }
        .user-id { font-size: 0.6rem; color: #8b949e; opacity: 0.6; }
    </style>
</head>
<body>
<script src="/js/api.js"></script>

<header>
    <div class="logo">SEFULL<span>BET</span></div>
    <div id="auth-box"></div>
</header>

<div class="date-navigator">
    <div class="date-input-wrapper"><input type="date" id="date-picker" onchange="carregarPalpites()"></div>
</div>

<div class="stat-bar">
    <div class="stat-item">ASSERTIVIDADE GRATIS: <b id="st-gratis">0%</b></div>
    <div class="stat-item">ASSERTIVIDADE VIP: <b id="st-vip" style="color:var(--vip)">0%</b></div>
</div>

<main>
    <div class="section-header"><h2>Palpites</h2><div class="line"></div></div>
    <div id="feed"></div>
    <div class="pagination-container" id="pag-palpites" style="display:none">
        <button class="btn-page" onclick="mudarPagPalpite(-1)">ANTERIOR</button>
        <span class="page-info" id="info-palpite">1/1</span>
        <button class="btn-page" onclick="mudarPagPalpite(1)">PROXIMO</button>
    </div>

    <div id="section-vitorias" style="display:none;">
        <div class="section-header"><h2>Vitorias</h2><div class="line"></div></div>
        <div id="grid-vitorias" class="vitorias-grid"></div>
        <div class="pagination-container" id="pag-vitorias" style="display:none">
            <button class="btn-page" onclick="mudarPagVitoria(-1)">ANTERIOR</button>
            <span class="page-info" id="info-vitoria">1/1</span>
            <button class="btn-page" onclick="mudarPagVitoria(1)">PROXIMO</button>
        </div>
    </div>

    <div class="news-section">
        <div class="section-header"><h2>Avisos</h2><div class="line"></div></div>
        <div id="feed-noticias"></div>
        <div class="pagination-container" id="pag-noticias" style="display:none">
            <button class="btn-page" onclick="mudarPagNoticia(-1)">ANTERIOR</button>
            <span class="page-info" id="info-noticia">1/1</span>
            <button class="btn-page" onclick="mudarPagNoticia(1)">PROXIMO</button>
        </div>
    </div>
</main>

<nav class="tab-bar">
    <div class="tab-item" onclick="window.scrollTo({top:0,behavior:'smooth'})"><span>&#9917;</span><p>Sinais</p></div>
    <div class="tab-item" onclick="document.getElementById('section-vitorias').scrollIntoView({behavior:'smooth'})"><span>&#127942;</span><p>Vitorias</p></div>
    <div class="tab-item tab-vip-btn" onclick="window.open('https://wa.me/5571992831101')"><span>&#128142;</span><p>VIP</p></div>
    <div class="tab-item" onclick="window.open('https://wa.me/5571992831101')"><span>&#128172;</span><p>Suporte</p></div>
</nav>

<div id="modal-geral" class="modal">
    <div class="modal-content">
        <div id="modal-view"></div>
        <button class="close-btn" onclick="document.getElementById('modal-geral').style.display='none'">FECHAR</button>
    </div>
</div>

<script>
let pagPalpite = 1, pagVitoria = 1, pagNoticia = 1;
let totalPalpites = 0, totalVitorias = 0, totalNoticias = 0;
const qtdPalpite = 5, qtdVitoria = 4, qtdNoticia = 3;

async function init() {
    document.getElementById('date-picker').value = new Date().toLocaleDateString('sv-SE');
    const user = getUsuario();
    const token = getToken();

    if (user && token) {
        const idCurto = user.id.split('-')[0];
        document.getElementById('auth-box').innerHTML = `
            <span class="user-id">ID: ${esc(idCurto)}</span>
            <button class="btn-auth" onclick="logout()">SAIR</button>`;
        carregarPalpites();
    } else {
        document.getElementById('auth-box').innerHTML = '<a href="/login.html" class="btn-auth">LOGIN</a>';
        document.getElementById('feed').innerHTML = `
            <div style="background:var(--card-bg);border:1px dashed var(--border);border-radius:20px;padding:40px 20px;text-align:center;margin-top:20px;">
                <div style="font-size:3rem;margin-bottom:15px;">&#128274;</div>
                <h3>Acesso Restrito</h3>
                <p style="color:#8b949e;font-size:0.9rem;margin-bottom:25px;">Faca login para ver os palpites.</p>
                <a href="/login.html" style="display:block;background:var(--primary);color:#000;padding:15px;border-radius:10px;text-decoration:none;font-weight:800;">FAZER LOGIN</a>
                <a href="/cadastro.html" style="color:var(--primary);font-weight:800;font-size:0.8rem;text-decoration:none;margin-top:10px;display:block;">NAO TEM CONTA? REGISTRE-SE</a>
            </div>`;
    }

    carregarStats();
    carregarVitorias();
    carregarNoticias();
}

async function carregarStats() {
    try {
        const data = await apiFetch('/api/palpites/stats');
        if (!data) return;
        document.getElementById('st-gratis').innerText = (data.gratis?.assertividade || 0) + '%';
        document.getElementById('st-vip').innerText = (data.vip?.assertividade || 0) + '%';
    } catch(e) {}
}

async function carregarPalpites() {
    if (!getToken()) return;
    const dataSel = document.getElementById('date-picker').value;
    try {
        const data = await apiFetch(`/api/palpites?data=${dataSel}&page=${pagPalpite}&limit=${qtdPalpite}`);
        if (!data) return;
        totalPalpites = data.total;
        const feed = document.getElementById('feed');

        if (data.palpites.length === 0) {
            feed.innerHTML = '<p style="text-align:center;opacity:0.3;padding:20px;">Nenhum palpite para esta data.</p>';
        } else {
            feed.innerHTML = data.palpites.map(p => `
                <div class="card ${p.tipo==='vip'?'card-vip':''}" onclick="abrirPalpite(${p.id})">
                    ${p.tipo==='vip'?'<div class="vip-tag">VIP</div>':''}
                    <div>
                        <small style="color:#8b949e">${esc(p.hora)}</small>
                        <b style="display:block;font-size:1rem;">${esc(p.confronto)}</b>
                        ${p.placar ? '<div style="font-size:1.1rem;font-weight:800;margin:4px 0;">'+esc(p.placar)+'</div>' : ''}
                        <span style="color:var(--primary);font-size:0.8rem;font-weight:800;">${esc(p.mercado)}</span><br>
                        <span class="status status-${p.status}">${esc(p.status)}</span>
                    </div>
                    <div class="odd-box"><small style="font-size:0.6rem;opacity:0.6;">ODD</small><br><b style="color:var(--primary)">${esc(p.odd)}</b></div>
                </div>`).join('');
        }

        const totalPags = Math.ceil(totalPalpites / qtdPalpite) || 1;
        document.getElementById('pag-palpites').style.display = totalPags > 1 ? 'flex' : 'none';
        document.getElementById('info-palpite').innerText = `${pagPalpite} / ${totalPags}`;
    } catch(e) { console.error(e); }
}

async function carregarVitorias() {
    try {
        const data = await apiFetch(`/api/vitorias?page=${pagVitoria}&limit=${qtdVitoria}`);
        if (!data || data.vitorias.length === 0) return;
        totalVitorias = data.total;
        document.getElementById('section-vitorias').style.display = 'block';
        document.getElementById('grid-vitorias').innerHTML = data.vitorias.map(v => {
            const capa = v.img2 || v.img1 || '';
            return `<div class="vitoria-card" onclick="abrirVitoria(${v.id})" style="${v.fixado?'border-color:var(--vip)':''}">
                ${capa ? '<img src="'+esc(capa)+'" class="vitoria-img-capa" onerror="this.style.display=\'none\'">' : ''}
                <div class="vitoria-content">
                    <span class="vitoria-titulo">${v.fixado?'&#128204; ':''} ${esc(v.titulo)}</span>
                    <p class="vitoria-assunto-parcial">${esc(v.assunto)}</p>
                </div>
            </div>`;
        }).join('');

        const totalPags = Math.ceil(totalVitorias / qtdVitoria) || 1;
        document.getElementById('pag-vitorias').style.display = totalPags > 1 ? 'flex' : 'none';
        document.getElementById('info-vitoria').innerText = `${pagVitoria} / ${totalPags}`;
    } catch(e) {}
}

async function carregarNoticias() {
    try {
        const data = await apiFetch(`/api/noticias?page=${pagNoticia}&limit=${qtdNoticia}`);
        if (!data) return;
        totalNoticias = data.total;
        document.getElementById('feed-noticias').innerHTML = data.noticias.map(n => {
            let midiaHtml = '';
            if (n.midia) {
                if (n.midia.includes('youtube.com') || n.midia.includes('youtu.be')) {
                    midiaHtml = '<div class="news-img-feed" style="display:flex;align-items:center;justify-content:center;background:#000;color:var(--primary);font-weight:bold;">VIDEO</div>';
                } else if (n.midia.toLowerCase().includes('.mp4')) {
                    midiaHtml = '<video src="'+esc(n.midia)+'" class="news-img-feed" muted autoplay loop></video>';
                } else {
                    midiaHtml = '<img src="'+esc(n.midia)+'" class="news-img-feed" onerror="this.style.display=\'none\'">';
                }
            }
            return `<div style="background:var(--card-bg);padding:15px;border-radius:15px;margin-bottom:15px;border:1px solid ${n.fixado?'var(--vip)':'var(--border)'};" onclick="abrirNoticia(${n.id})">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <b style="color:var(--primary)">${n.fixado?'&#128204; ':''}${esc(n.titulo)}</b>
                    <small style="color:#8b949e">${esc(n.data)}</small>
                </div>
                ${midiaHtml}
                <p style="font-size:0.75rem;color:#8b949e;margin-top:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(n.conteudo)}</p>
            </div>`;
        }).join('');

        const totalPags = Math.ceil(totalNoticias / qtdNoticia) || 1;
        document.getElementById('pag-noticias').style.display = totalPags > 1 ? 'flex' : 'none';
        document.getElementById('info-noticia').innerText = `${pagNoticia} / ${totalPags}`;
    } catch(e) {}
}

function abrirPalpite(id) {
    apiFetch(`/api/palpites?data=${document.getElementById('date-picker').value}&page=1&limit=100`).then(data => {
        if (!data) return;
        const p = data.palpites.find(x => x.id === id);
        if (!p) return;
        document.getElementById('modal-view').innerHTML = `
            <h3 style="color:var(--primary);text-align:center;">${esc(p.confronto)}</h3>
            <div style="text-align:center;font-size:2rem;font-weight:800;margin:15px 0;">${p.placar ? esc(p.placar) : 'vs'}</div>
            <p style="text-align:center;font-weight:800;color:var(--vip)">${esc(p.mercado)}</p>
            <p style="text-align:center;margin-top:10px;color:#8b949e">Odd: ${esc(p.odd)} | Hora: ${esc(p.hora)}</p>`;
        document.getElementById('modal-geral').style.display = 'block';
    });
}

function abrirVitoria(id) {
    apiFetch(`/api/vitorias?page=1&limit=100`).then(data => {
        if (!data) return;
        const v = data.vitorias.find(x => x.id === id);
        if (!v) return;
        document.getElementById('modal-view').innerHTML = `
            <h3 style="color:var(--vip);text-align:center;">${esc(v.titulo)}</h3>
            <div class="modal-gallery">${v.img1?'<img src="'+esc(v.img1)+'">':''}${v.img2?'<img src="'+esc(v.img2)+'">':''}</div>
            <p style="color:#ccc;font-size:0.9rem;line-height:1.6;background:rgba(0,0,0,0.2);padding:15px;border-radius:12px;">${esc(v.assunto)}</p>`;
        document.getElementById('modal-geral').style.display = 'block';
    });
}

function abrirNoticia(id) {
    apiFetch(`/api/noticias?page=1&limit=100`).then(data => {
        if (!data) return;
        const n = data.noticias.find(x => x.id === id);
        if (!n) return;
        document.getElementById('modal-view').innerHTML = `
            <h3 style="color:var(--primary)">${esc(n.titulo)}</h3>
            <small style="color:#8b949e">${esc(n.data)}</small>
            <p style="margin-top:15px;color:#ddd;line-height:1.6;">${esc(n.conteudo)}</p>`;
        document.getElementById('modal-geral').style.display = 'block';
    });
}

function mudarPagPalpite(d) { pagPalpite += d; if(pagPalpite<1)pagPalpite=1; carregarPalpites(); }
function mudarPagVitoria(d) { pagVitoria += d; if(pagVitoria<1)pagVitoria=1; carregarVitorias(); }
function mudarPagNoticia(d) { pagNoticia += d; if(pagNoticia<1)pagNoticia=1; carregarNoticias(); }

window.onload = init;
</script>
</body>
</html>
