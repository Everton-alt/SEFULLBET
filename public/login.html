<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SeFull Bet</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0b0e14;
            --card: #161b22;
            --border: #30363d;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1c2128 0%, #0b0e14 100%);
        }

        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 30px; }
        .logo span { color: #fff; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 8px; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(0, 255, 136, 0.2); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer-links { margin-top: 25px; font-size: 0.85rem; color: #8b949e; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">SEFULL<span>BET</span></div>
    <form id="form-login">
        <div class="input-group">
            <label>USUÁRIO OU EMAIL</label>
            <input type="text" id="user" placeholder="Digite seu usuário" required>
        </div>
        <div class="input-group">
            <label>SENHA</label>
            <input type="password" id="pass" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login" id="btnEntrar">ENTRAR NO PAINEL</button>
    </form>
    
    <div class="footer-links">
        Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
    </div>
</div>

<script>
    const API_URL = "https://sefullbet.onrender.com";

    document.getElementById('form-login').onsubmit = async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnEntrar');
        const usuarioInput = document.getElementById('user').value.toLowerCase().trim();
        const senhaInput = document.getElementById('pass').value;

        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";

        // 1. REGRA DO ADMIN (Acesso direto do Henrique)
        if(usuarioInput === 'admin' && senhaInput === '123') {
            const adminData = {
                nome: "Administrador",
                email: "admin@sefullbet.com",
                perfil: "admin",
                status: "ativo"
            };
            localStorage.setItem('usuarioLogado', JSON.stringify(adminData));
            alert("Bem-vindo, Henrique!");
            window.location.href = 'admin.html';
            return;
        }

        // 2. LÓGICA PARA USUÁRIOS NO SERVIDOR
        try {
            const response = await fetch(`${API_URL}/usuarios`);
            if (!response.ok) throw new Error("Erro ao buscar usuários");
            
            const listaUsuarios = await response.json();
            
            const userEncontrado = listaUsuarios.find(u => 
                (u.email.toLowerCase() === usuarioInput || u.nome.toLowerCase() === usuarioInput) && 
                u.senha === senhaInput
            );

            if(userEncontrado) {
                if(userEncontrado.status !== 'ativo') {
                    alert("Sua conta está pendente de ativação pelo administrador.");
                } else {
                    localStorage.setItem('usuarioLogado', JSON.stringify(userEncontrado));
                    window.location.href = 'feed.html';
                }
            } else {
                alert("Usuário ou senha incorretos!");
            }
        } catch (error) {
            console.error("Erro no login:", error);
            alert("Erro ao conectar com o servidor. Tente novamente.");
        } finally {
            btn.disabled = false;
            btn.innerText = "ENTRAR NO PAINEL";
        }
    };
</script>

</body>
</html>
